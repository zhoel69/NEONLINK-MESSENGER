<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>NeonLink Messenger</title>

<style>

/* GLOBAL */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-user-select:none;
  user-select:none;
}

input, textarea{
  -webkit-user-select:text;
  user-select:text;
}

/* BODY */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f2027,#0b141a,#05080c);
  color:white;
}

/* WRAPPER */
.wrapper{
  display:flex;
  width:95%;
  max-width:850px;
  height:90vh;
  border-radius:20px;
  overflow:hidden;
  background:#0b141a;
  box-shadow:0 30px 80px rgba(0,0,0,0.8);
}

/* SIDEBAR */
.sidebar{
  width:35%;
  background:#111b21;
  padding:12px;
  overflow:auto;
  border-right:1px solid #1f2a30;
}

.contact{
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  margin-bottom:8px;
  background:#1a262d;
}

.contact:hover{
  background:#22323a;
}

.contact.active{
  background:#25d366;
  color:#081c12;
  font-weight:bold;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:14px;
}

/* HEADER */
.title{
  text-align:center;
  font-size:20px;
  font-weight:600;
  color:#25d366;
}

.subtitle{
  text-align:center;
  font-size:12px;
  color:#8b949e;
  margin-bottom:10px;
}

/* INPUT */
.input-box{
  position:relative;
  margin-top:10px;
}

input, textarea{
  width:100%;
  padding:12px 42px 12px 12px;
  border:none;
  border-radius:14px;
  outline:none;
  color:white;
  font-size:14px;
}

#number{
  background:#1f2a30;
}

#message{
  background:#162027;
  margin-top:10px;
  min-height:80px;
  resize:none;
}

/* ICON */
.contact-icon{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  color:#25d366;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:14px;
  background:#25d366;
  color:#062e1a;
  font-weight:600;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  margin-top:10px;
  overflow:auto;
  background:#0e161b;
  padding:10px;
  border-radius:14px;
}

.empty{
  text-align:center;
  color:#666;
  margin-top:40%;
}

/* MESSAGE */
.msg{
  margin:6px 0;
  padding:8px 10px;
  border-radius:10px;
  max-width:70%;
  font-size:13px;
}

.in{
  background:#1f2a30;
}

.out{
  background:#25d366;
  color:#062e1a;
  margin-left:auto;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:10px;
  color:#666;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar" id="contactList"></div>

  <!-- MAIN -->
  <div class="main">

    <div class="title">NeonLink Messenger</div>
    <div class="subtitle">Realtime WhatsApp Control Interface</div>

    <!-- INPUT -->
    <div class="input-box">
      <input id="number" placeholder="08xxx / 62xxx / +62xxx">
      <span class="contact-icon" onclick="pickContact()">📇</span>
    </div>

    <textarea id="message" placeholder="Tulis pesan..."></textarea>

    <button onclick="send()">Kirim Pesan</button>

    <!-- CHAT -->
    <div class="chat" id="chat">
      <div class="empty">Belum ada percakapan</div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      Zulfahmi Afnula © 2026 — All Rights Reserved
    </div>

  </div>

</div>

<script src="http://127.0.0.1:3000/socket.io/socket.io.js"></script>

<script>

// STATE
let currentChat = null
let chatDB = {}
let contacts = []

// CONTACT PICKER
async function pickContact(){
  try{
    if(!navigator.contacts){
      alert("Browser tidak support kontak")
      return
    }

    const result = await navigator.contacts.select(['name','tel'], {multiple:false})

    if(result.length){
      document.getElementById("number").value = result[0].tel[0]
    }
  }catch(e){
    alert("Gagal akses kontak")
  }
}

// RENDER CONTACT
function renderContacts(){
  const list = document.getElementById("contactList")
  list.innerHTML = ""

  contacts.forEach(c=>{
    const div = document.createElement("div")
    div.className = "contact"
    div.innerText = c.name

    if(currentChat === c.number){
      div.classList.add("active")
    }

    div.onclick = ()=>{
      currentChat = c.number
      document.getElementById("number").value = c.number
      renderContacts()
      loadChat()
    }

    list.appendChild(div)
  })
}

// LOAD CHAT
function loadChat(){
  const chat = document.getElementById("chat")
  chat.innerHTML = ""

  if(!currentChat){
    chat.innerHTML = `<div class="empty">Pilih kontak untuk mulai chat</div>`
    return
  }

  const messages = chatDB[currentChat] || []

  if(messages.length === 0){
    chat.innerHTML = `<div class="empty">Belum ada pesan</div>`
    return
  }

  messages.forEach(m=>{
    const div = document.createElement("div")
    div.className = "msg " + m.type
    div.innerText = m.text
    chat.appendChild(div)
  })

  chat.scrollTop = chat.scrollHeight
}

// NORMALIZE
function normalizeNumber(num){
  num = num.replace(/\D/g,'')
  if(num.startsWith('0')) num = '62' + num.slice(1)
  if(!num.startsWith('62')) num = '62' + num
  return num
}

// ADD MESSAGE
function addMessage(text, type, number){
  if(!chatDB[number]) chatDB[number] = []
  chatDB[number].push({ text, type })

  if(currentChat === number){
    loadChat()
  }
}

// SEND
async function send(){
  const raw = document.getElementById("number").value
  const number = normalizeNumber(raw)
  const message = document.getElementById("message").value

  if(!number || !message) return

  currentChat = number

  if(!contacts.find(c=>c.number===number)){
    contacts.push({ name:number, number })
    renderContacts()
  }

  addMessage(message,"out",number)

  try{
    await fetch("http://127.0.0.1:3000/send",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ number, message })
    })
  }catch(e){
    addMessage("error koneksi","in",number)
  }

  document.getElementById("message").value=""
}

// SOCKET REALTIME
const socket = io("http://127.0.0.1:3000")

socket.on("incoming",(data)=>{
  const from = data.from.replace('@s.whatsapp.net','')

  if(!contacts.find(c=>c.number===from)){
    contacts.push({ name:from, number:from })
    renderContacts()
  }

  addMessage(data.text,"in",from)
})

// INIT
renderContacts()
loadChat()

</script>

</body>
</html>
