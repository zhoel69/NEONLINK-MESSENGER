<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>NeonLink Messenger</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* GLOBAL */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

input, textarea{
  -webkit-user-select:text;
  user-select:text;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0f2027,#0b141a,#05080c);
  font-family:sans-serif;
  color:white;
}

/* CARD */
.container{
  width:92%;
  max-width:420px;
  background:#111b21;
  border-radius:18px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
}

.title{
  font-size:18px;
  font-weight:bold;
  color:#25d366;
}

.subtitle{
  font-size:11px;
  color:#777;
  margin-bottom:10px;
}

.input-box{
  position:relative;
  margin-top:14px;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  outline:none;
  color:white;
  font-size:14px;
}

#number{background:#1f2a30;}
#message{background:#162027;margin-top:12px;min-height:90px;}

button{
  width:100%;
  margin-top:10px;
  padding:11px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn-send{background:#25d366;color:#0b141a;}
.btn-contact{background:#2a3942;color:white;}
.btn-delete{background:#ff3b3b;color:white;}

.chat{
  margin-top:12px;
  height:150px;
  overflow:auto;
  background:#0b141a;
  border-radius:10px;
  padding:8px;
  text-align:left;
  font-size:12px;
}

.msg{
  margin:4px 0;
  padding:6px 8px;
  border-radius:8px;
  max-width:80%;
  word-wrap:break-word;
  -webkit-user-select:text;
  user-select:text;
  cursor:pointer;
}

.in{background:#202c33;}
.out{background:#25d366;color:black;margin-left:auto;}

.footer{
  margin-top:12px;
  font-size:10px;
  color:#666;
}

</style>
</head>

<body>

<div class="container">

  <div class="title">NEONLINK MESSENGER</div>
  <div class="subtitle">Realtime WhatsApp + Database</div>

  <input id="number" placeholder="08xxx / 62xxx">
  <textarea id="message" placeholder="Tulis pesan..."></textarea>

  <button class="btn-send" onclick="send()">KIRIM</button>
  <button class="btn-delete" onclick="deleteAll()">HAPUS SEMUA CHAT</button>

  <div class="chat" id="chat"></div>

  <div class="footer">Zulfahmi Afnula © 2026</div>

</div>

<script src="http://127.0.0.1:3000/socket.io/socket.io.js"></script>

<script>

// ================= SUPABASE =================
const supabase = window.supabase.createClient(
  "https://wepqievfgfqsoilynrhc.supabase.co",
  "sb_publishable_AUDqRGYqJi1pA7Y_QOIa-A_bIz-_zI1"
)

// ================= STATE =================
let currentChat = null
let chatDB = {}

// ================= NORMALIZE =================
function normalizeNumber(num){
  num = num.replace(/\D/g,'')
  if(num.startsWith('0')) num = '62' + num.slice(1)
  if(!num.startsWith('62')) num = '62' + num
  return num
}

// ================= SAVE TO DB =================
async function saveToDB(number, message, type){
  await supabase.from("massage-record").insert([
    { number, message, type }
  ])
}

// ================= LOAD FROM DB =================
async function loadFromDB(number){
  const { data } = await supabase
    .from("massage-record")
    .select("*")
    .eq("number", number)

  chatDB[number] = data || []
  loadChat()
}

// ================= RENDER CHAT =================
function loadChat(){
  const chat = document.getElementById("chat")
  chat.innerHTML = ""

  if(!currentChat){
    chat.innerHTML = `<div style="text-align:center;color:#666;">Mulai chat dulu</div>`
    return
  }

  const messages = chatDB[currentChat] || []

  messages.forEach(m=>{
    const div = document.createElement("div")
    div.className = "msg " + m.type
    div.innerText = m.message

    div.onclick = async ()=>{
      await navigator.clipboard.writeText(m.message)
    }

    chat.appendChild(div)
  })

  chat.scrollTop = chat.scrollHeight
}

// ================= SEND =================
async function send(){
  const number = normalizeNumber(document.getElementById("number").value)
  const message = document.getElementById("message").value

  if(!number || !message) return

  currentChat = number

  const msg = { number, message, type:"out" }

  if(!chatDB[number]) chatDB[number] = []
  chatDB[number].push(msg)

  loadChat()

  await saveToDB(number, message, "out")

  document.getElementById("message").value = ""
}

// ================= DELETE ALL =================
async function deleteAll(){
  await supabase.from("massage-record").delete().neq("id", 0)
  chatDB = {}
  currentChat = null
  loadChat()
  alert("Semua chat dihapus dari database")
}

// ================= SOCKET =================
const socket = io("http://127.0.0.1:3000")

socket.on("incoming", async (data)=>{
  const from = data.from.replace('@s.whatsapp.net','')
  currentChat = from

  const message = data.text

  if(!chatDB[from]) chatDB[from] = []

  chatDB[from].push({ message, type:"in" })

  await saveToDB(from, message, "in")

  loadChat()
})

// ================= INIT =================
loadChat()

</script>

</body>
</html>
