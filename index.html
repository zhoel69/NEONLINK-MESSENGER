<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>NeonLink Messenger</title>

<style>

/* ================= GLOBAL ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-user-select:none;
  user-select:none;
}

input, textarea, .msg{
  -webkit-user-select:text;
  user-select:text;
}

/* BODY */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0f2027,#0b141a,#05080c);
  font-family:sans-serif;
  color:white;
}

/* CARD */
.container{
  width:92%;
  max-width:420px;
  background:#111b21;
  border-radius:18px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
}

/* TITLE */
.title{
  font-size:18px;
  font-weight:bold;
  color:#25d366;
}

.subtitle{
  font-size:11px;
  color:#777;
  margin-bottom:14px;
}

/* INPUT */
.input-box{
  position:relative;
  margin-top:14px;
}

input, textarea{
  width:100%;
  padding:12px 42px 12px 12px;
  border-radius:12px;
  border:none;
  outline:none !important;
  box-shadow:none !important;
  color:white;
  font-size:14px;
}

/* input style */
#number{ background:#1f2a30; }
#message{
  background:#162027;
  margin-top:12px;
  min-height:90px;
  resize:none;
}

/* ICON */
.contact-icon{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  cursor:pointer;
  color:#25d366;
  transition:0.15s ease;
}

/* ================= BUTTONS ================= */
button{
  width:100%;
  margin-top:10px;
  padding:11px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.15s ease;
  outline:none !important;
  box-shadow:none !important;
}

/* ❌ HILANG TOTAL FOCUS EFFECT */
button:focus,
input:focus,
textarea:focus,
.contact-icon:focus{
  outline:none !important;
  box-shadow:none !important;
}

/* 🔥 ONLY KEMPES EFFECT */
button:active,
input:active,
textarea:active,
.contact-icon:active{
  transform:scale(0.94);
}

/* BUTTON STYLE */
.btn-send{
  background:linear-gradient(135deg,#25d366,#1db954);
  color:#0b141a;
}

.btn-contact{
  background:linear-gradient(135deg,#2a3942,#1c252b);
  color:white;
}

.btn-restart{
  background:linear-gradient(135deg,#ff3b3b,#c62828);
  color:white;
}

/* ================= CHAT ================= */
.chat{
  margin-top:12px;
  height:150px;
  overflow:auto;
  background:#0b141a;
  border-radius:10px;
  padding:8px;
  text-align:left;
  font-size:12px;
}

/* MESSAGE */
.msg{
  margin:4px 0;
  padding:6px 8px;
  border-radius:8px;
  max-width:80%;
  word-wrap:break-word;
  user-select:text;
}

.in{ background:#202c33; }
.out{
  background:#25d366;
  color:black;
  margin-left:auto;
}

/* EMPTY */
.empty{
  text-align:center;
  color:#666;
  margin-top:40px;
}

.footer{
  margin-top:12px;
  font-size:10px;
  color:#666;
}

</style>
</head>

<body>

<div class="container">

  <div class="title">NEONLINK MESSENGER</div>
  <div class="subtitle">Realtime Reactive System</div>

  <div class="input-box">
    <input id="number" placeholder="08xxx / 62xxx / +62xxx">
    <span class="contact-icon" onclick="pickContact()">📇</span>
  </div>

  <textarea id="message" placeholder="Tulis pesan..."></textarea>

  <button class="btn-send" onclick="send()">KIRIM</button>
  <button class="btn-contact" onclick="pickContact()">PILIH KONTAK</button>
  <button class="btn-restart" onclick="restartChat()">RESTART CHAT</button>

  <div class="chat" id="chat">
    <div class="empty">Menunggu pesan...</div>
  </div>

  <div class="footer">NeonLink © 2026</div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="http://127.0.0.1:3000/socket.io/socket.io.js"></script>

<script>

const SUPABASE_URL = 'https://wepqievfgfqsoilynrhc.supabase.co'
const SUPABASE_KEY = 'sb_publishable_AUDqRGYqJi1pA7Y_QOIa-A_bIz-_zI1'
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

/* ================= STATE ================= */
let currentChat = localStorage.getItem("currentChat") || null

/* ================= NORMALIZE ================= */
function normalizeNumber(num){
  num = num.replace(/\D/g,'')
  if(num.startsWith('0')) num = '62' + num.slice(1)
  if(!num.startsWith('62')) num = '62' + num
  return num
}

/* ================= RENDER ================= */
function renderMessage(m){
  const chat = document.getElementById("chat")

  const empty = chat.querySelector(".empty")
  if(empty) empty.remove()

  const div = document.createElement("div")
  div.className = "msg " + m.type
  div.innerText = m.text

  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

/* ================= LOAD CHAT ================= */
async function loadChat(){
  const chat = document.getElementById("chat")
  chat.innerHTML = ""

  if(!currentChat){
    chat.innerHTML = `<div class="empty">Mulai percakapan</div>`
    return
  }

  localStorage.setItem("currentChat", currentChat)

  const { data } = await supabaseClient
    .from('messages')
    .select('*')
    .eq('number', currentChat)
    .order('created_at', { ascending: true })

  if(!data || data.length === 0){
    chat.innerHTML = `<div class="empty">Belum ada pesan</div>`
    return
  }

  data.forEach(renderMessage)
}

/* ================= SAVE ================= */
async function saveMessage(number, text, type){
  return await supabaseClient
    .from('messages')
    .insert([{ number, text, type }])
}

/* ================= SEND ================= */
async function send(){
  const raw = document.getElementById("number").value
  const number = normalizeNumber(raw)
  const message = document.getElementById("message").value

  if(!number || !message) return

  currentChat = number
  localStorage.setItem("currentChat", currentChat)

  await saveMessage(number, message, "out")

  document.getElementById("message").value = ""

  loadChat()

  try{
    await fetch("http://127.0.0.1:3000/send",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ number, message })
    })
  }catch(e){
    await saveMessage(number, "error koneksi", "in")
  }
}

/* ================= RESTART CHAT ================= */
async function restartChat(){
  if(!confirm("Hapus semua pesan?")) return

  await supabaseClient
    .from('messages')
    .delete()
    .neq('id','00000000-0000-0000-0000-000000000000')

  document.getElementById("chat").innerHTML =
    `<div class="empty">Chat direset</div>`
}

/* ================= CONTACT ================= */
async function pickContact(){
  try{
    if(!navigator.contacts) return alert("Device tidak support kontak")

    const result = await navigator.contacts.select(['tel'], {multiple:false})

    if(result.length){
      document.getElementById("number").value = result[0].tel[0]
    }
  }catch(e){}
}

/* ================= REALTIME ================= */
supabaseClient
  .channel('messages-realtime')
  .on('postgres_changes',{
    event:'*',
    schema:'public',
    table:'messages'
  },(payload)=>{

    const msg = payload.new

    if(!currentChat || msg.number !== currentChat) return

    renderMessage(msg)
  })
  .subscribe()

/* ================= SOCKET ================= */
const socket = io("http://127.0.0.1:3000")

socket.on("incoming", async (data)=>{
  const from = data.from.replace('@s.whatsapp.net','')

  currentChat = from
  localStorage.setItem("currentChat", currentChat)

  await saveMessage(from, data.text, "in")

  loadChat()
})

/* ================= INIT ================= */
loadChat()

</script>

</body>
</html>
