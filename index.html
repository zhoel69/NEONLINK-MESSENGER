<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<!-- 🔥 FIX ZOOM (PINCH DISABLE) -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>NeonLink Messenger</title>

<style>

/* ================= GLOBAL ================= */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-user-select:none;
  user-select:none;
}

input, textarea {
  -webkit-user-select:text;
  user-select:text;
}

/* ================= BODY ================= */
body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0f2027,#0b141a,#05080c);
  font-family:sans-serif;
  color:white;

  /* 🔥 extra anti zoom gesture (mobile fix layer) */
  touch-action: manipulation;
}

/* ================= CARD ================= */
.container {
  width:92%;
  max-width:420px;
  background:#111b21;
  border-radius:18px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
}

/* ================= TITLE ================= */
.title {
  font-size:18px;
  font-weight:bold;
  color:#25d366;
}

.subtitle {
  font-size:11px;
  color:#777;
  margin-bottom:18px;
}

/* ================= INPUT WRAPPER ================= */
.input-box {
  position:relative;
  margin-top:14px;
}

/* ================= INPUT STYLE ================= */
input, textarea {
  width:100%;
  padding:12px 42px 12px 12px;
  border-radius:12px;
  border:none;
  outline:none;
  color:white;
  font-size:14px;
}

/* 🔥 BEDA WARNA INPUT */
#number {
  background:#1f2a30; /* lebih terang */
}

#message {
  background:#162027; /* lebih gelap */
  margin-top:14px;    /* 🔥 JARAK JELAS */
  min-height:120px;
  resize:none;
}

/* ================= CONTACT ICON ================= */
.contact-icon {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  cursor:pointer;
  color:#25d366;
}

/* ================= BUTTON ================= */
button {
  width:100%;
  margin-top:12px;
  padding:11px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

/* tombol kirim */
.btn-send {
  background:#25d366;
  color:#0b141a;
}

/* tombol kontak */
.btn-contact {
  background:#2a3942;
  color:white;
}

/* ================= LOG ================= */
.log {
  margin-top:14px;
  font-size:11px;
  color:#aaa;
  background:#0b141a;
  padding:10px;
  border-radius:10px;
  height:90px;
  overflow:auto;
  text-align:left;
}

/* ================= FOOTER ================= */
.footer {
  margin-top:14px;
  font-size:10px;
  color:#666;
}

</style>
</head>

<body>

<div class="container">

  <div class="title">NEONLINK MESSENGER</div>
  <div class="subtitle">Secure WhatsApp Control System</div>

  <!-- NOMOR -->
  <div class="input-box">
    <input id="number" placeholder="08xxx / 62xxx / +62xxx">
    <span class="contact-icon" onclick="pickContact()">📞</span>
  </div>

  <!-- PESAN -->
  <textarea id="message" placeholder="Tulis pesan..."></textarea>

  <!-- BUTTON -->
  <button class="btn-send" onclick="send()">KIRIM</button>
  <button class="btn-contact" onclick="pickContact()">PILIH KONTAK</button>

  <!-- LOG -->
  <div class="log" id="log">ready...</div>

  <!-- FOOTER -->
  <div class="footer">
    Zulfahmi Afnula © 2026 — All Rights Reserved
  </div>

</div>

<script>

// ================= NORMALIZE NUMBER =================
function normalizeNumber(num){
  num = num.replace(/\D/g,'')

  if(num.startsWith('0')) num = '62' + num.slice(1)
  if(!num.startsWith('62')) num = '62' + num

  return num
}

// ================= CONTACT PICKER =================
async function pickContact(){
  const log = document.getElementById("log")

  try {
    if(!navigator.contacts){
      log.innerHTML += "<br>❌ device tidak support kontak"
      return
    }

    const contacts = await navigator.contacts.select(['tel'], {multiple:false})

    if(contacts.length > 0){
      document.getElementById("number").value = contacts[0].tel[0]
      log.innerHTML += "<br>📞 kontak dipilih"
    }

  } catch(e){
    log.innerHTML += "<br>⚠️ gagal akses kontak"
  }
}

// ================= SEND =================
async function send(){
  const number = normalizeNumber(document.getElementById("number").value)
  const message = document.getElementById("message").value
  const log = document.getElementById("log")

  log.innerHTML += "<br>⏳ mengirim..."

  try {
    const res = await fetch("http://YOUR-SERVER:3000/send", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ number, message })
    })

    const data = await res.json()

    if(data.success){
      log.innerHTML += "<br>✅ terkirim"
    } else {
      log.innerHTML += "<br>❌ gagal"
    }

  } catch(e){
    log.innerHTML += "<br>⚠️ error koneksi"
  }
}

</script>

</body>
</html>
