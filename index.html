<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>NeonLink Messenger</title>

<style>

/* GLOBAL */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-user-select:none;
  user-select:none;
}

input, textarea{
  -webkit-user-select:text;
  user-select:text;
}

/* BODY */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0f2027,#0b141a,#05080c);
  font-family:sans-serif;
  color:white;
  touch-action: manipulation;
}

/* CARD */
.container{
  width:92%;
  max-width:420px;
  background:#111b21;
  border-radius:18px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
}

/* TITLE */
.title{
  font-size:18px;
  font-weight:bold;
  color:#25d366;
}

.subtitle{
  font-size:11px;
  color:#777;
  margin-bottom:14px;
}

/* INPUT */
.input-box{
  position:relative;
  margin-top:14px;
}

input, textarea{
  width:100%;
  padding:12px 42px 12px 12px;
  border-radius:12px;
  border:none;
  outline:none;
  color:white;
  font-size:14px;
}

#number{
  background:#1f2a30;
}

#message{
  background:#162027;
  margin-top:12px;
  min-height:90px;
  resize:none;
}

/* ICON */
.contact-icon{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  cursor:pointer;
  color:#25d366;
}

/* BUTTON */
button{
  width:100%;
  margin-top:10px;
  padding:11px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn-send{
  background:#25d366;
  color:#0b141a;
}

.btn-contact{
  background:#2a3942;
  color:white;
}

/* CHAT */
.chat{
  margin-top:12px;
  height:150px;
  overflow:auto;
  background:#0b141a;
  border-radius:10px;
  padding:8px;
  text-align:left;
  font-size:12px;
}

.empty{
  text-align:center;
  color:#666;
  margin-top:40px;
}

/* MESSAGE */
.msg{
  margin:4px 0;
  padding:6px 8px;
  border-radius:8px;
  max-width:80%;
  word-wrap:break-word;
}

.in{
  background:#202c33;
}

.out{
  background:#25d366;
  color:black;
  margin-left:auto;
}

/* FOOTER */
.footer{
  margin-top:12px;
  font-size:10px;
  color:#666;
}

</style>
</head>

<body>

<div class="container">

  <div class="title">NEONLINK MESSENGER</div>
  <div class="subtitle">Realtime WhatsApp System</div>

  <!-- NOMOR -->
  <div class="input-box">
    <input id="number" placeholder="08xxx / 62xxx / +62xxx">
    <span class="contact-icon" onclick="pickContact()">📇</span>
  </div>

  <!-- PESAN -->
  <textarea id="message" placeholder="Tulis pesan..."></textarea>

  <!-- BUTTON -->
  <button class="btn-send" onclick="send()">KIRIM</button>
  <button class="btn-contact" onclick="pickContact()">PILIH KONTAK</button>

  <!-- CHAT -->
  <div class="chat" id="chat">
    <div class="empty">Belum ada percakapan</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    Zulfahmi Afnula © 2026 — All Rights Reserved
  </div>

</div>

<script src="http://127.0.0.1:3000/socket.io/socket.io.js"></script>

<script>

// ================= STATE =================
let currentChat = null
let chatDB = {}

// ================= NORMALIZE =================
function normalizeNumber(num){
  num = num.replace(/\D/g,'')
  if(num.startsWith('0')) num = '62' + num.slice(1)
  if(!num.startsWith('62')) num = '62' + num
  return num
}

// ================= RENDER CHAT =================
function loadChat(){
  const chat = document.getElementById("chat")
  chat.innerHTML = ""

  if(!currentChat){
    chat.innerHTML = `<div class="empty">Mulai kirim pesan dulu</div>`
    return
  }

  const messages = chatDB[currentChat] || []

  if(messages.length === 0){
    chat.innerHTML = `<div class="empty">Belum ada pesan</div>`
    return
  }

  messages.forEach(m=>{
    const div = document.createElement("div")
    div.className = "msg " + m.type
    div.innerText = m.text
    chat.appendChild(div)
  })

  chat.scrollTop = chat.scrollHeight
}

// ================= ADD MESSAGE =================
function addMessage(text, type, number){
  if(!chatDB[number]) chatDB[number] = []
  chatDB[number].push({ text, type })

  // 🔥 langsung update kalau chat aktif
  if(currentChat === number){
    loadChat()
  }
}

// ================= CONTACT =================
async function pickContact(){
  try{
    if(!navigator.contacts){
      alert("Device tidak support kontak")
      return
    }

    const result = await navigator.contacts.select(['tel'], {multiple:false})

    if(result.length){
      document.getElementById("number").value = result[0].tel[0]
    }

  }catch(e){
    alert("Gagal akses kontak")
  }
}

// ================= SEND =================
async function send(){
  const raw = document.getElementById("number").value
  const number = normalizeNumber(raw)
  const message = document.getElementById("message").value

  if(!number || !message) return

  currentChat = number

  addMessage(message,"out",number)

  try{
    await fetch("http://127.0.0.1:3000/send",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ number, message })
    })
  }catch(e){
    addMessage("error koneksi","in",number)
  }

  document.getElementById("message").value=""
}

// ================= SOCKET =================
const socket = io("http://127.0.0.1:3000")

socket.on("incoming",(data)=>{
  const from = data.from.replace('@s.whatsapp.net','')

  // 🔥 AUTO PINDAH KE CHAT YANG MASUK
  currentChat = from

  addMessage(data.text,"in",from)

  loadChat()
})

// ================= INIT =================
loadChat()

</script>

</body>
</html>
